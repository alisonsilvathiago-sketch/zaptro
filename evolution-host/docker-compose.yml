# Stack Evolution oficial (imagem Docker) + Postgres + Redis.
# Não duplica o código-fonte da Evolution — só orquestração.
# Copie env.example → .env na mesma pasta e ajuste SERVER_URL / AUTHENTICATION_API_KEY.

services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-network

  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution_user
      POSTGRES_PASSWORD: evolution_password
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-network

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution-network

networks:
  evolution-network:
    driver: bridge

volumes:
  evolution_instances:
  evolution_postgres_data:
  evolution_redis_data:
